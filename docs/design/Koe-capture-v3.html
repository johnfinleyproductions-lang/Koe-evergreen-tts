  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+6625, U+66f8, U+672c, U+673a, U+68da, U+8074, U+8aad, U+ff0b;\n}\n@font-face {\n  font-family: 'Shippori Mincho';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"d4c01455-c8d4-4bf1-a186-0ee54d237564\") format('woff2');\n  unicode-range: U+20-7e, U+b7, U+d7, U+2013-2014, U+201c-201d, U+2026, U+2190, U+2192, U+2317, U+25a2, U+25a4, U+25be, U+2600, U+2605, U+2614, U+263e, U+266a, U+2702, U+270e, U+58f0, U+5b57, U+5eab, U+6587, U+6625, U+66f8, U+672c, U+673a, U+68da, U+8074, U+8aad, U+ff0b;\n}\n@font-face {\n  font-family: 'Zen Kaku Gothic New';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"f68e6af5-24bb-4817-8b77-5c2c15446b97\") format('woff2');\n  unicode-range: U+20-7e, U+b7, U+d7, U+2013-2014, U+201c-201d, U+2026, U+2190, U+2192, U+2317, U+25a2, U+25a4, U+25be, U+2600, U+2605, U+2614, U+263e, U+266a, U+2702, U+270e, U+58f0, U+5b57, U+5eab, U+6587, U+6625, U+66f8, U+672c, U+673a, U+68da, U+8074, U+8aad, U+ff0b;\n}\n@font-face {\n  font-family: 'Zen Kaku Gothic New';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"cddadf28-ba1e-4c6d-b52c-c791f6c59125\") format('woff2');\n  unicode-range: U+20-7e, U+b7, U+d7, U+2013-2014, U+201c-201d, U+2026, U+2190, U+2192, U+2317, U+25a2, U+25a4, U+25be, U+2600, U+2605, U+2614, U+263e, U+266a, U+2702, U+270e, U+58f0, U+5b57, U+5eab, U+6587, U+6625, U+66f8, U+672c, U+673a, U+68da, U+8074, U+8aad, U+ff0b;\n}\n@font-face {\n  font-family: 'Zen Kaku Gothic New';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2c214a4b-a085-41e8-938c-e29abb82456b\") format('woff2');\n  unicode-range: U+20-7e, U+b7, U+d7, U+2013-2014, U+201c-201d, U+2026, U+2190, U+2192, U+2317, U+25a2, U+25a4, U+25be, U+2600, U+2605, U+2614, U+263e, U+266a, U+2702, U+270e, U+58f0, U+5b57, U+5eab, U+6587, U+6625, U+66f8, U+672c, U+673a, U+68da, U+8074, U+8aad, U+ff0b;\n}\n<\u002Fstyle>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#d2cbbc;font-family:'Zen Kaku Gothic New',sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}\n  [data-theme=\"light\"]{\n    --desk:radial-gradient(130% 90% at 50% -10%, #e3dccd 0%, #d4ccba 62%, #cabfa9 100%);\n    --s0:#fdfaf4;--s1:#faf4e8;--s2:#f6eedd;--s3:#f4ecdd;--canvas:#f1e8d6;--navAct:#efe6d2;\n    --ink:#2c2620;--ink2:#3f382d;--ink3:#544b3d;--soft:#6f6557;--faint:#8c8472;--faint2:#9a8f7c;--mute:#a99f8c;\n    --line:#e6dabf;--line2:#ece0c6;--dash:#d4c4a0;\n    --on:#faf4e8;--tile:#2c2620;--waveOff:#e6dabf;\n    --note:#33455f;--note2:#7c8a5b;--toastBg:#2c2620;--toastFg:#faf4e8;\n    --readerBg:#d6d1c4;--readerBar:#cbc6b8;--tintShu:#f4ddd6;--tintAi:#dde3ec;\n  }\n  [data-theme=\"dark\"]{\n    --desk:radial-gradient(130% 90% at 50% -10%, #2b2620 0%, #211d18 60%, #16130f 100%);\n    --s0:#2a251e;--s1:#252019;--s2:#201b15;--s3:#322c23;--canvas:#1b1712;--navAct:#352e23;\n    --ink:#f2ece0;--ink2:#ddd5c6;--ink3:#cbc2b1;--soft:#b3a994;--faint:#9a8f7b;--faint2:#857b69;--mute:#7d7361;\n    --line:#3a342b;--line2:#332e27;--dash:#4a4236;\n    --on:#f6efe2;--tile:#4a4136;--waveOff:#4a4236;\n    --note:#a8c0df;--note2:#b7c68d;--toastBg:#f2ece0;--toastFg:#2c2620;\n    --readerBg:#2a2620;--readerBar:#201b15;--tintShu:#3c2620;--tintAi:#26313f;\n  }\n  @keyframes koeWv{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}\n  @keyframes koeBlink{0%,100%{opacity:1;}50%{opacity:.35;}}\n  @keyframes koeToast{from{opacity:0;transform:translate(-50%,8px);}to{opacity:1;transform:translate(-50%,0);}}\n  @keyframes koePop{from{opacity:0;transform:translate(-50%,-48%) scale(.96);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}\n  @keyframes koeRain{from{background-position:0 0;}to{background-position:-26px 140px;}}\n  @keyframes koeSteam{0%{opacity:0;transform:translateY(0) scaleX(.9);}25%{opacity:.45;}100%{opacity:0;transform:translateY(-30px) scaleX(1.7);}}\n  @keyframes koeSpin{from{transform:rotate(0);}to{transform:rotate(360deg);}}\n  @keyframes koeFlicker{0%,100%{opacity:.92;}45%{opacity:1;}70%{opacity:.84;}}\n  @keyframes koeMote{0%{opacity:0;transform:translateY(0);}40%{opacity:.6;}100%{opacity:0;transform:translateY(-24px);}}\n  .koe-journal{font-family:'Klee One',cursive;}\n  .koe-journal::placeholder{color:#b9ab8c;font-style:italic;}\n  .koe-journal:focus{outline:none;}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div data-theme=\"light\" style=\"background:var(--desk);\">\n<div data-theme=\"{{ theme }}\" style=\"min-height:100vh;display:flex;align-items:center;justify-content:center;padding:26px;background:var(--desk);\">\n  <div style=\"position:relative;width:1200px;height:770px;background:var(--s1);border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:0 1px 0 #fff inset,0 30px 70px -30px rgba(60,45,25,.6),0 8px 20px -10px rgba(60,45,25,.3);display:flex;flex-direction:column;\">\n\n    <!-- ===== BODY ROW: sidebar + main ===== -->\n    <div style=\"flex:1;display:flex;min-height:0;\">\n\n      <!-- ----- SIDEBAR ----- -->\n      <div style=\"width:216px;flex:none;background:var(--s2);border-right:1px solid var(--line);display:flex;flex-direction:column;padding:18px 14px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;padding:4px 8px 16px;\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-weight:800;font-size:22px;color:var(--ink);\">Koe<\u002Fspan>\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:15px;color:#c0432d;\">声<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:3px;\">\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">\n              <span style=\"width:22px;text-align:center;font-family:'Shippori Mincho',serif;font-size:15px;\">{{ item.icon }}<\u002Fspan>\n              {{ item.label }}\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:auto;display:flex;flex-direction:column;gap:10px;\">\n        <button onclick=\"{{ toggleTheme }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;border:1px solid var(--line);background:var(--s1);font:600 12px 'Zen Kaku Gothic New';color:var(--soft);\"><span style=\"font-size:13px;width:16px;text-align:center;\">{{ themeIcon }}<\u002Fspan>{{ themeLabel }}<\u002Fbutton>\n        <div style=\"display:flex;flex-direction:column;gap:9px;background:var(--s1);border:1px solid var(--line);border-radius:11px;padding:12px;\">\n          <div style=\"font:600 9.5px 'Zen Kaku Gothic New';letter-spacing:.14em;text-transform:uppercase;color:var(--mute);\">Now reading<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:8px;\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#c0432d;animation:koeBlink 1.8s ease-in-out infinite;flex:none;\"><\u002Fspan>\n            <span style=\"font-family:'Shippori Mincho',serif;font-size:13px;color:var(--ink);line-height:1.2;\">The Quiet Hour<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"font:400 11px 'DM Mono';color:var(--mute);\">research.pdf · selection<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ----- MAIN ----- -->\n      <div style=\"position:relative;flex:1;min-width:0;overflow:hidden;\">\n\n        <!-- ===== CAPTURE (PDF) ===== -->\n        <sc-if value=\"{{ isCapture }}\" hint-placeholder-val=\"{{ true }}\">\n          <div data-screen-label=\"Capture — PDF selection\" style=\"position:absolute;inset:0;background:var(--readerBg);display:flex;flex-direction:column;overflow:auto;\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:11px 18px;background:var(--readerBar);border-bottom:1px solid var(--line);flex:none;\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:#c8836f;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#d8bd7e;\"><\u002Fspan><span style=\"width:11px;height:11px;border-radius:50%;background:#9fb083;\"><\u002Fspan>\n              <span style=\"font:500 12px 'DM Mono';color:var(--ink3);margin-left:8px;\">research.pdf<\u002Fspan>\n              <span style=\"font:400 12px 'DM Mono';color:var(--mute);margin-left:auto;\">page 3 / 18 · 124%<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;display:flex;justify-content:center;padding:34px 0 70px;\">\n              <div data-theme=\"light\" style=\"width:620px;background:var(--s0);border:1px solid var(--line);box-shadow:0 20px 50px -20px rgba(40,30,15,.5);padding:54px 58px;\">\n                <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:25px;color:var(--ink);margin-bottom:6px;\">On Protecting the First Hour<\u002Fdiv>\n                <div style=\"font:400 11px 'DM Mono';color:var(--mute);margin-bottom:24px;\">M. Aoki · Journal of Attention, 2024<\u002Fdiv>\n                <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;line-height:29px;color:var(--ink3);margin-bottom:16px;\">There is a particular kind of silence that belongs to early morning, before the world has decided what it wants from you. Writers have chased it for centuries — not for its emptiness, but for its fullness: a room in which thought can finally hear itself.<\u002Fdiv>\n                <!-- SELECTION -->\n                <div style=\"position:relative;border-radius:5px;padding:6px 9px;margin:6px -9px 18px;background:{{ selBg }};box-shadow:{{ selRing }};\">\n                  <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;line-height:29px;color:var(--ink);\">\n                    <sc-for list=\"{{ words }}\" as=\"word\" hint-placeholder-count=\"60\"><span style=\"{{ word.style }}\">{{ word.text }}<\u002Fspan> <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <!-- floating Koe chip -->\n                  <div style=\"position:absolute;left:6px;top:100%;margin-top:11px;z-index:5;display:flex;align-items:center;gap:9px;background:var(--s1);border:1px solid var(--line);border-radius:26px;padding:7px 10px 7px 7px;box-shadow:0 14px 30px -10px rgba(40,30,15,.45),0 2px 5px rgba(40,30,15,.2);\">\n                    <button onclick=\"{{ togglePlay }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:8px;background:#c0432d;color:var(--on);border-radius:20px;padding:8px 14px 8px 11px;font:700 12.5px 'Zen Kaku Gothic New';\">\n                      <sc-if value=\"{{ playing }}\" hint-placeholder-val=\"{{ true }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 18 18\"><rect x=\"3\" y=\"2\" width=\"4\" height=\"14\" rx=\"1.3\" fill=\"var(--on)\"><\u002Frect><rect x=\"11\" y=\"2\" width=\"4\" height=\"14\" rx=\"1.3\" fill=\"var(--on)\"><\u002Frect><\u002Fsvg><\u002Fsc-if>\n                      <sc-if value=\"{{ paused }}\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 20 20\"><path d=\"M6 4l11 6-11 6z\" fill=\"var(--on)\"><\u002Fpath><\u002Fsvg><\u002Fsc-if>\n                      Listen\n                    <\u002Fbutton>\n                    <span style=\"width:1px;height:22px;background:var(--line);\"><\u002Fspan>\n                    <button onclick=\"{{ toggleHighlight }}\" style=\"{{ hlChipStyle }}\">\n                      <span style=\"width:13px;height:13px;border-radius:3px;background:#c0432d;\"><\u002Fspan>Highlight\n                    <\u002Fbutton>\n                    <button onclick=\"{{ addToCanvas }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--s3);border-radius:18px;padding:7px 12px;font:500 12px 'Zen Kaku Gothic New';color:var(--ink3);\"><span style=\"font-size:13px;\">⌗<\u002Fspan>Add to canvas<\u002Fbutton>\n                    <button onclick=\"{{ openPicker }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--s3);border-radius:18px;padding:7px 12px;font:500 12px 'Zen Kaku Gothic New';color:var(--ink3);\"><span style=\"font-size:13px;\">▤<\u002Fspan>Save to board ▾<\u002Fbutton>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"font-family:'Shippori Mincho',serif;font-size:15.5px;line-height:29px;color:var(--ink3);margin-top:46px;\">What we protect in those minutes is not time exactly, but a quality of mind. Speed asks us to skim; depth asks us to stay. The difference, repeated daily, compounds into a life.<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ===== THE QUIET HOUR ===== -->\n        <sc-if value=\"{{ isRead }}\">\n          <div data-screen-label=\"Reading — The Quiet Hour\" style=\"position:absolute;inset:0;display:flex;justify-content:center;padding:36px 40px;background:var(--s1);background-image:repeating-linear-gradient(to bottom,transparent 0 33px,rgba(60,95,150,.08) 33px 34px);background-position:0 92px;overflow:auto;\">\n            <div style=\"position:relative;width:860px;\">\n              <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:22px;\">\n                <div>\n                  <div style=\"font-family:'Zen Kaku Gothic New';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute);margin-bottom:3px;\">Reading aloud · from research.pdf<\u002Fdiv>\n                  <div style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:29px;color:var(--ink);\">The Quiet Hour<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"margin-left:auto;display:flex;gap:9px;\">\n                  <button onclick=\"{{ addToCanvas }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--s3);border-radius:20px;padding:8px 13px;font:500 12.5px 'Zen Kaku Gothic New'; ding:30px 30px 22px;display:flex;flex-direction:column;box-shadow:inset -22px 0 32px -20px rgba(80,60,30,.5);\">\n              <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:16px;\">\n                <span style=\"font-family:'Shippori Mincho',serif;color:#c0432d;font-size:18px;\">聴<\u002Fspan>\n                <span style=\"font:600 11px 'Zen Kaku Gothic New';letter-spacing:.12em;text-transform:uppercase;color:#9a7d4f;\">From your listening<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"flex:1;overflow:auto;display:flex;flex-direction:column;gap:13px;\">\n                <sc-if value=\"{{ hasPulled }}\">\n                  <sc-for list=\"{{ pulledView }}\" as=\"p\" hint-placeholder-count=\"2\">\n                    <div style=\"border-left:2px solid #d8b27a;padding:2px 0 2px 12px;\">\n                      <div style=\"font-family:'Shippori Mincho',serif;font-style:italic;font-size:14.5px;line-height:1.6;color:#574a35;\">“{{ p.t }}”<\u002Fdiv>\n                      <div style=\"font:400 10.5px 'DM Mono';color:#a9966f;margin-top:4px;\">{{ p.src }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ noPulled }}\">\n                  <div style=\"font-family:'Klee One',cursive;font-size:14.5px;line-height:1.6;color:#a9966f;margin-top:6px;\">Bring quotes you saved into this page, then write from them →<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <button onclick=\"{{ toggleDeskPull }}\" style=\"all:unset;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;background:#2c2017;color:#f3ead4;border-radius:9px;padding:12px 10px;font:600 12.5px 'Zen Kaku Gothic New';\">＋ Pull from boards ▾<\u002Fbutton>\n            <\u002Fdiv>\n            <!-- spine -->\n            <div style=\"width:5px;background:linear-gradient(90deg, rgba(80,60,30,.5), rgba(80,60,30,.14));\"><\u002Fdiv>\n            <!-- RIGHT page -->\n            <div style=\"position:relative;width:392px;height:560px;background:#fbf4e4;border-radius:0 10px 10px 0;box-shadow:inset 22px 0 32px -20px rgba(80,60,30,.5);\">\n              <div style=\"position:absolute;left:30px;top:22px;right:24px;display:flex;align-items:center;gap:10px;\">\n                <span style=\"width:11px;height:11px;border-radius:50%;background:{{ activeSectionAccent }};flex:none;\"><\u002Fspan>\n                <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:19px;color:#3a3328;\">{{ activeSectionName }}<\u002Fspan>\n                <span style=\"font-family:'Shippori Mincho',serif;font-size:14px;color:#bcaa86;margin-left:auto;\">書<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:absolute;left:30px;right:24px;top:52px;height:1px;background:rgba(120,100,60,.2);\"><\u002Fdiv>\n              <textarea class=\"koe-journal\" ref=\"{{ journalRef }}\" oninput=\"{{ onJournalInput }}\" placeholder=\"Now that you've listened… write what stayed with you.\" style=\"position:absolute;left:28px;right:22px;top:68px;bottom:40px;width:auto;border:none;background:repeating-linear-gradient(to bottom, transparent 0 31px, rgba(120,100,60,.18) 31px 32px);font-size:17px;line-height:32px;color:#3a3328;resize:none;padding:0;\"><\u002Ftextarea>\n              <div style=\"position:absolute;left:30px;bottom:14px;display:flex;align-items:center;gap:6px;font:400 10.5px 'DM Mono';color:#bcaa86;\"><span style=\"width:6px;height:6px;border-radius:50%;background:#7c8a5b;\"><\u002Fspan>auto-saved<\u002Fdiv>\n              <!-- ribbon bookmark -->\n              <div style=\"position:absolute;right:34px;top:-6px;width:16px;height:54px;background:linear-gradient(180deg,{{ activeSectionAccent }},rgba(0,0,0,.2));clip-path:polygon(0 0,100% 0,100% 100%,50% 82%,0 100%);box-shadow:0 4px 6px -3px rgba(0,0,0,.5);\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:absolute;inset:0;pointer-events:none;box-shadow:0 0 180px 50px rgba(0,0,0,.6) inset;\"><\u002Fdiv>\n\n        <!-- PULL panel (in opened book) -->\n        <sc-if value=\"{{ deskPullOpen }}\">\n          <div onclick=\"{{ toggleDeskPull }}\" style=\"position:absolute;inset:0;background:rgba(10,7,5,.42);z-index:14;\"><\u002Fdiv>\n          <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:15;width:320px;max-height:460px;display:flex;flex-direction:column;background:#241c15;border:1px solid rgba(124,104,72,.5);border-radius:14px;box-shadow:0 26px 56px -20px rgba(0,0,0,.75);overflow:hidden;\">\n            <div style=\"display:flex;align-items:center;gap:8px;padding:14px 16px 10px;\">\n              <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:15.5px;color:#f3ead4;\">Pull into notebook<\u002Fspan>\n              <span style=\"font-family:'Shippori Mincho',serif;font-size:12px;color:#c0432d;\">棚<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"flex:1;overflow:auto;padding:0 12px 12px;display:flex;flex-direction:column;gap:13px;\">\n              <sc-for list=\"{{ pullGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n                <div>\n                  <div style=\"display:flex;align-items:center;gap:7px;margin:2px 4px 7px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ g.accent }};\"><\u002Fspan><span style=\"font:700 11px 'Zen Kaku Gothic New';color:#d8cdb6;\">{{ g.name }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;gap:5px;\">\n                    <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                      <button onclick=\"{{ it.onPick }}\" style=\"all:unset;cursor:pointer;display:flex;gap:8px;padding:9px 10px;border-radius:8px;background:rgba(243,234,212,.05);border:1px solid rgba(124,104,72,.25);\">\n                        <span style=\"color:{{ g.accent }};font-size:13px;line-height:1.3;flex:none;\">＋<\u002Fspan>\n                        <span style=\"font-family:'Shippori Mincho',serif;font-style:italic;font-size:12px;line-height:1.45;color:#cfc3aa;\">{{ it.t }}<\u002Fspan>\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== SAVE-TO-BOARD PICKER ===== -->\n    <sc-if value=\"{{ pickerOpen }}\">\n      <div onclick=\"{{ closePicker }}\" style=\"position:absolute;inset:0;background:rgba(44,38,32,.34);z-index:20;\"><\u002Fdiv>\n      <div style=\"position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:21;width:340px;background:var(--s1);border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 70px -24px rgba(40,30,15,.6);padding:18px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:4px;\">\n          <span style=\"font-family:'Shippori Mincho',serif;font-weight:700;font-size:18px;color:var(--ink);\">Save to board<\u002Fspan>\n          <span style=\"font-family:'Shippori Mincho',serif;font-size:13px;color:#c0432d;\">棚<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"font:400 12px 'Zen Kaku Gothic New';color:var(--faint2);margin-bottom:14px;\">“{{ snippet }}”<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <sc-for list=\"{{ pickerBoards }}\" as=\"b\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ b.onPick }}\" style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--s0);\">\n              <span style=\"width:11px;height:11px;border-radius:50%;background:{{ b.accent }};flex:none;\"><\u002Fspan>\n              <span style=\"font:600 13.5px 'Zen Kaku Gothic New';color:var(--ink);\">{{ b.name }}<\u002Fspan>\n              <span style=\"font:400 11px 'DM Mono';color:var(--mute);margin-left:auto;\">{{ b.count }}<\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n          <button style=\"all:unset;cursor:pointer;display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:9px;border:1px dashed var(--dash);color:var(--faint);font:600 13px 'Zen Kaku Gothic New';\">＋ New board<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===== TOAST ===== -->\n    <sc-if value=\"{{ hasToast }}\">\n      <div style=\"position:absolute;left:50%;bottom:100px;transform:translateX(-50%);z-index:30;display:flex;align-items:center;gap:9px;background:var(--toastBg);color:var(--toastFg);border-radius:22px;padding:11px 18px;box-shadow:0 14px 30px -10px rgba(0,0,0,.5);font:600 13px 'Zen Kaku Gothic New';\">\n        <span style=\"width:8px;height:8px;border-radius:50%;background:#9fb083;\"><\u002Fspan>{{ toastText }}\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1252,&quot;height&quot;:822}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'capture', playing: true, elapsed: 14, wordIndex: 3, theme: 'light',\n    pulled: [], deskPullOpen: false, rainOn: false, lofiOn: false, openedBook: null,\n    sections: [\n      { id: 'reflections', name: 'Reflections', accent: '#c0432d' },\n      { id: 'quotes', name: 'Quotes', accent: '#cf9b4a' },\n      { id: 'ideas', name: 'Ideas', accent: '#7c8a5b' },\n      { id: 'todo', name: 'To-do', accent: '#33455f' },\n    ],\n    activeSection: 'reflections',\n    highlightOn: true, pickerOpen: false, selectedBoard: null, toast: null,\n    boards: [\n      { id: 'evergreen', name: 'Evergreen', accent: '#7c8a5b', items: [\n        { t: 'attention is still whole — unbroken, unspent', src: 'The Quiet Hour', kind: 'read' },\n        { t: 'Slow reading is a small act of resistance', src: 'Idea Canvas', kind: 'clip' } ] },\n      { id: 'luminary', name: 'Luminary lessons', accent: '#cf9b4a', items: [\n        { t: 'Depth is a choice you make against speed', src: 'The Quiet Hour', kind: 'read' },\n        { t: 'Make the first hour un-interruptible', src: 'Idea Canvas', kind: 'clip' },\n        { t: 'Teach by subtraction, not addition', src: 'lecture.pdf', kind: 'read' } ] },\n      { id: 'oss', name: 'cool open source projects', accent: '#33455f', items: [\n        { t: 'ripgrep — ludicrously fast code search', src: 'github.com', kind: 'clip' },\n        { t: 'tldraw — an infinite canvas SDK', src: 'github.com', kind: 'clip' } ] },\n      { id: 'research', name: 'current research', accent: '#c0432d', items: [\n        { t: 'Sleep spindles & memory consolidation', src: 'nature.pdf', kind: 'read' },\n        { t: 'Attention residue between tasks', src: 'paper.pdf', kind: 'read' },\n        { t: 'The default mode network at rest', src: 'paper.pdf', kind: 'clip' } ] },\n    ],\n  };\n  total = 42;\n  snippet = 'Before the inbox wakes, there is a narrow window where attention is still whole.';\n  _bodies = (() => { try { return JSON.parse(localStorage.getItem('koe2.bodies') || 'null') || {}; } catch (e) { return {}; } })();\n  journalRef = (el) => { if (el) { this._ta = el; const v = this._bodies[this.state.activeSection] || ''; if (document.activeElement !== el && el.value !== v) el.value = v; } };\n  WORDS = \"The quietest hour of the morning belongs to no one. Before the inbox wakes, before the first notification, there is a narrow window where attention is still whole — unbroken, unspent. To read slowly, then, is a small act of resistance. It is choosing depth in a world that rewards speed, and the choosing itself becomes the practice.\".split(/\\s+/);\n\n  componentDidMount() {\n    this.sentenceStarts = [0];\n    this.WORDS.forEach((w, i) => { if (/[.!?]$/.test(w) && i + 1 < this.WORDS.length) this.sentenceStarts.push(i + 1); });\n    try {\n      const s = JSON.parse(localStorage.getItem('koe2.state') || 'null');\n      if (s) this.setState({ view: s.view ?? 'capture', playing: s.playing ?? true, elapsed: s.elapsed ?? 14, wordIndex: s.wordIndex ?? 3, theme: s.theme ?? 'light' });\n    } catch (e) {}\n    try { const pj = JSON.parse(localStorage.getItem('koe2.pulled') || 'null'); if (pj && Array.isArray(pj)) this.setState({ pulled: pj }); } catch (e) {}\n    try { const sj = JSON.parse(localStorage.getItem('koe2.sections') || 'null'); if (sj && Array.isArray(sj) && sj.length) this.setState({ sections: sj, activeSection: sj[0].id }); } catch (e) {}\n    if (Object.keys(this._bodies).length === 0) { try { const old = localStorage.getItem('koe2.journal'); if (old) { this._bodies = { reflections: old }; localStorage.setItem('koe2.bodies', JSON.stringify(this._bodies)); } } catch (e) {} }\n    this._acc = 0; this._wacc = 0;\n    this._timer = setInterval(() => this.tick(), 60);\n  }\n  componentWillUnmount() { clearInterval(this._timer); if (this._toastT) clearTimeout(this._toastT); this.stopRain(); }\n\n  tick() {\n    if (!this.state.playing) return;\n    const N = this.WORDS.length;\n    this._wacc += 60; this._acc += 60;\n    let { wordIndex, elapsed } = this.state; let changed = false;\n    if (this._wacc >= 430) { this._wacc -= 430; wordIndex = (wordIndex + 1) % N; changed = true; }\n    if (this._acc >= 1000) { this._acc -= 1000; elapsed += 1; if (elapsed > this.total) elapsed = 0; changed = true; }\n    if (changed) { this.setState({ wordIndex, elapsed }); this.persist({ wordIndex, elapsed }); }\n  }\n  persist(extra) { try { const s = { ...this.state, ...extra }; localStorage.setItem('koe2.state', JSON.stringify({ view: s.view, playing: s.playing, elapsed: s.elapsed, wordIndex: s.wordIndex, theme: s.theme })); } catch (e) {} }\n\n  nav(view) { this.setState({ view, selectedBoard: null, openedBook: null }); this.persist({ view }); }\n  togglePlay() { const playing = !this.state.playing; this.setState({ playing }); this.persist({ playing }); }\n  toggleTheme() { const theme = this.state.theme === 'dark' ? 'light' : 'dark'; this.setState({ theme }); this.persist({ theme }); }\n  openBook(id) { this.setState({ openedBook: id, activeSection: id }); }\n  closeBook() { this.setState({ openedBook: null }); }\n  onJournalInput(e) { this._bodies = { ...this._bodies, [this.state.activeSection]: e.target.value }; try { localStorage.setItem('koe2.bodies', JSON.stringify(this._bodies)); } catch (_) {} }\n  setTaValue(id) { const ta = this._ta || document.querySelector('textarea.koe-journal'); if (ta) ta.value = this._bodies[id] || ''; }\n  switchSection(id) { if (id !== this.state.activeSection) { this.setState({ activeSection: id }); this.setTaValue(id); } }\n  addSection() {\n    const palette = ['#c0432d', '#cf9b4a', '#7c8a5b', '#33455f', '#9a6b3e', '#7a3f6a', '#3f7a6a'];\n    const n = this.state.sections.length;\n    const id = 'sec-' + Date.now();\n    const sections = [...this.state.sections, { id, name: 'Section ' + (n + 1), accent: palette[n % palette.length] }];\n    this.setState({ sections, activeSection: id });\n    this.setTaValue(id);\n    try { localStorage.setItem('koe2.sections', JSON.stringify(sections)); } catch (_) {}\n    this.flash('New section added');\n  }\n  toggleDeskPull() { this.setState({ deskPullOpen: !this.state.deskPullOpen }); }\n  pullInto(t, src) { const pulled = [...this.state.pulled, { t, src }]; this.setState({ pulled, deskPullOpen: false }); try { localStorage.setItem('koe2.pulled', JSON.stringify(pulled)); } catch (_) {} this.flash('Pulled into your journal'); }\n  toggleLofi() { this.setState({ lofiOn: !this.state.lofiOn }); }\n  toggleRain() { const rainOn = !this.state.rainOn; this.setState({ rainOn }); if (rainOn) this.startRain(); else this.stopRain(); }\n  ensureAudio() {\n    if (this._actx) return;\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext; if (!AC) return;\n      this._actx = new AC();\n      const n = 2 * this._actx.sampleRate, buf = this._actx.createBuffer(1, n, this._actx.sampleRate), d = buf.getChannelData(0);\n      let last = 0; for (let i = 0; i < n; i++) { const w = Math.random() * 2 - 1; last = (last + 0.02 * w) / 1.02; d[i] = last * 3.2; }\n      this._noiseBuf = buf;\n    } catch (e) {}\n  }\n  startRain() {\n    this.ensureAudio(); if (!this._actx) return;\n    try {\n      if (this._actx.state === 'suspended') this._actx.resume();\n      const src = this._actx.createBufferSource(); src.buffer = this._noiseBuf; src.loop = true;\n      const lp = this._actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1500;\n      const g = this._actx.createGain(); g.gain.value = 0;\n      src.connect(lp); lp.connect(g); g.connect(this._actx.destination); src.start();\n      g.gain.linearRampToValueAtTime(0.11, this._actx.currentTime + 0.7);\n      this._rainSrc = src; this._rainGain = g;\n    } catch (e) {}\n  }\n  stopRain() {\n    try {\n      if (this._rainGain && this._actx) this._rainGain.gain.linearRampToValueAtTime(0, this._actx.currentTime + 0.35);\n      const s = this._rainSrc; this._rainSrc = null;\n      if (s) setTimeout(() => { try { s.stop(); } catch (e) {} }, 450);\n    } catch (e) {}\n  }\n  toggleHighlight() { const v = !this.state.highlightOn; this.setState({ highlightOn: v }); this.flash(v ? 'Highlight kept on the source' : 'Highlight removed from source'); }\n  prevSentence() {\n    const st = this.sentenceStarts, wi = this.state.wordIndex;\n    let cur = 0; for (const s of st) { if (s <= wi) cur = s; else break; }\n    let target = cur;\n    if (wi - cur <= 1) { const idx = st.indexOf(cur); target = idx > 0 ? st[idx - 1] : 0; }\n    this._wacc = 0; this.setState({ wordIndex: target }); this.persist({ wordIndex: target });\n  }\n  nextSentence() {\n    const st = this.sentenceStarts, wi = this.state.wordIndex;\n    let target = st[st.length - 1];\n    for (const s of st) { if (s > wi) { target = s; break; } }\n    this._wacc = 0; this.setState({ wordIndex: target }); this.persist({ wordIndex: target });\n  }\n  flash(msg) { if (this._toastT) clearTimeout(this._toastT); this.setState({ toast: msg }); this._toastT = setTimeout(() => this.setState({ toast: null }), 2200); }\n  addToCanvas() { this.flash('Added to the Idea Canvas'); this.setState({ view: 'canvas' }); this.persist({ view: 'canvas' }); }\n  openPicker() { this.setState({ pickerOpen: true }); }\n  closePicker() { this.setState({ pickerOpen: false }); }\n  saveToBoard(id) {\n    const boards = this.state.boards.map(b => b.id === id\n      ? { ...b, items: [{ t: this.snippet, src: 'The Quiet Hour', kind: 'read' }, ...b.items] }\n      : b);\n    const name = this.state.boards.find(b => b.id === id).name;\n    this.setState({ boards, pickerOpen: false });\n    this.flash('Saved to “' + name + '”');\n  }\n  openBoard(id) { this.setState({ view: 'boards', selectedBoard: id }); this.persist({ view: 'boards' }); }\n  closeBoard() { this.setState({ selectedBoard: null }); }\n\n  renderVals() {\n    const fmt = (s) => { s = Math.max(0, Math.round(s)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };\n    const wi = this.state.wordIndex;\n    const words = this.WORDS.map((w, i) => ({\n      text: w,\n      style: i === wi\n        ? 'background:rgba(192,67,45,.26);border-radius:4px;padding:1px 4px;color:var(--ink);font-weight:600;box-decoration-break:clone;-webkit-box-decoration-break:clone;'\n        : (i < wi ? 'color:var(--ink2);' : 'color:var(--faint2);')\n    }));\n    const playState = this.state.playing ? 'running' : 'paused';\n    const spec = [['60%', '#c0432d', 0], ['92%', '#c0432d', 1], ['48%', '#c0432d', 2], ['78%', '#d98c7a', 3], ['55%', '#d98c7a', 4]];\n    const waveBars = [];\n    for (let i = 0; i < 56; i++) {\n      if (i < 5) { const [h, c, k] = spec[i]; waveBars.push({ style: `flex:none;width:3.5px;height:${h};border-radius:2px;background:${c};transform-origin:center;animation:koeWv 1s ease-in-out infinite ${k * 0.12}s;animation-play-state:${playState};` }); }\n      else { const h = 30 + ((i * 37) % 60); waveBars.push({ style: `flex:none;width:3.5px;height:${h}%;border-radius:2px;background:var(--line);` }); }\n    }\n    const kindMeta = (kind) => kind === 'read'\n      ? { kindLabel: 'read', kindColor: '#a3361f', kindTint: 'var(--tintShu)' }\n      : { kindLabel: 'clip', kindColor: '#33455f', kindTint: 'var(--tintAi)' };\n    const meta = (b) => { const r = b.items.filter(x => x.kind === 'read').length; const c = b.items.length - r; return b.items.length + ' saved · ' + r + ' reads · ' + c + ' clips'; };\n\n    const navMk = (key, label, icon) => {\n      const active = this.state.view === key;\n      return { label, icon, onClick: () => this.nav(key),\n        style: `all:unset;cursor:pointer;display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:9px;font:${active ? '700' : '500'} 13.5px 'Zen Kaku Gothic New';color:${active ? 'var(--ink)' : 'var(--soft)'};background:${active ? 'var(--navAct)' : 'transparent'};box-shadow:${active ? 'inset 3px 0 0 #c0432d' : 'none'};` };\n    };\n    const navItems = [navMk('capture', 'Capture', '▤'), navMk('read', 'The Quiet Hour', '読'), navMk('canvas', 'Idea Canvas', '⌗'), navMk('desk', 'Study Desk', '机'), navMk('shelf', 'Library', '本'), navMk('boards', 'Boards', '棚')];\n    const bookHeights = [196, 212, 184, 206, 192, 200, 188];\n    const bookWidths = [50, 54, 48, 52, 50, 54, 48];\n    const books = this.state.sections.map((s, i) => ({\n      name: s.name, accent: s.accent, onOpen: () => this.openBook(s.id),\n      style: `position:relative;flex:none;width:${bookWidths[i % bookWidths.length]}px;height:${bookHeights[i % bookHeights.length]}px;border-radius:5px 5px 2px 2px;background:linear-gradient(95deg, rgba(0,0,0,.30) 0 6%, rgba(255,255,255,.12) 7% 11%, rgba(255,255,255,0) 34%), ${s.accent};box-shadow:inset 0 0 0 1px rgba(0,0,0,.18),0 12px 18px -10px rgba(0,0,0,.65);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s, box-shadow .15s;`,\n    }));\n    const ambBtn = (on) => `all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;border-radius:18px;padding:8px 13px;font:600 12px 'Zen Kaku Gothic New';transition:background .15s;` + (on ? 'background:#c0432d;color:#f6efe2;' : 'color:#d8cdb6;');\n    const pullGroups = this.state.boards.map(b => ({ name: b.name, accent: b.accent, items: b.items.map(it => ({ t: it.t, onPick: () => this.pullInto(it.t, b.name) })) }));\n\n    const boardsView = this.state.boards.map(b => ({\n      name: b.name, accent: b.accent, meta: meta(b),\n      preview: b.items.slice(0, 2).map(x => ({ t: '“' + x.t + '”' })),\n      onOpen: () => this.openBoard(b.id),\n    }));\n\n    const opened = this.state.boards.find(b => b.id === this.state.selectedBoard);\n    const openedItems = opened ? opened.items.map(x => ({ t: x.t, src: x.src, ...kindMeta(x.kind) })) : [];\n\n    return {\n      isCapture: this.state.view === 'capture',\n      isRead: this.state.view === 'read',\n      isCanvas: this.state.view === 'canvas',\n      showBoardsOverview: this.state.view === 'boards' && !this.state.selectedBoard,\n      showBoardDetail: this.state.view === 'boards' && !!this.state.selectedBoard,\n      playing: this.state.playing, paused: !this.state.playing,\n      words, waveBars,\n      elapsedStr: fmt(this.state.elapsed), totalStr: fmt(this.total),\n      navItems, boardsView, openedItems,\n      openedName: opened ? opened.name : '', openedAccent: opened ? opened.accent : '#c0432d', openedMeta: opened ? meta(opened) : '',\n      selBg: this.state.highlightOn ? 'rgba(192,67,45,.15)' : 'rgba(0,0,0,0)',\n      selRing: this.state.highlightOn ? 'inset 0 0 0 1px rgba(192,67,45,.3)' : 'none',\n      hlChipStyle: 'all:unset;cursor:pointer;display:flex;align-items:center;gap:7px;border-radius:18px;padding:7px 12px;font:600 12px \\'Zen Kaku Gothic New\\';' + (this.state.highlightOn ? 'border:1px solid #d98c7a;background:var(--tintShu);color:#a3361f;' : 'border:1px solid var(--line);background:var(--s3);color:var(--soft);'),\n      pickerOpen: this.state.pickerOpen, snippet: this.snippet,\n      pickerBoards: this.state.boards.map(b => ({ name: b.name, accent: b.accent, count: b.items.length + ' saved', onPick: () => this.saveToBoard(b.id) })),\n      hasToast: !!this.state.toast, toastText: this.state.toast || '',\n      theme: this.state.theme, themeIcon: this.state.theme === 'dark' ? '☀' : '☾', themeLabel: this.state.theme === 'dark' ? 'Light mode' : 'Dark mode',\n      toggleTheme: () => this.toggleTheme(),\n      isDesk: this.state.view === 'desk',\n      isShelf: this.state.view === 'shelf',\n      bookOpen: this.state.view === 'shelf' && !!this.state.openedBook,\n      books, closeBook: () => this.closeBook(),\n      journalRef: this.journalRef, onJournalInput: (e) => this.onJournalInput(e),\n      ...(() => {\n        const tabBase = \"all:unset;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;padding:16px 9px;border-radius:0 10px 10px 0;font:700 12.5px 'Zen Kaku Gothic New';letter-spacing:.05em;margin-bottom:7px;text-align:center;min-height:86px;box-sizing:border-box;\";\n        const active = this.state.sections.find(s => s.id === this.state.activeSection) || this.state.sections[0];\n        const sectionTabs = this.state.sections.map(s => {\n          const on = s.id === active.id;\n          return { name: s.name, accent: s.accent, onClick: () => this.switchSection(s.id),\n            style: tabBase + (on\n              ? `background:#fbf4e4;color:${s.accent};margin-left:-5px;box-shadow:7px 5px 16px -7px rgba(0,0,0,.45);`\n              : 'background:#e7d9bb;color:#8a7a58;box-shadow:4px 4px 11px -6px rgba(0,0,0,.4);') };\n        });\n        return { sectionTabs, activeSectionName: active.name, activeSectionAccent: active.accent, addSection: () => this.addSection() };\n      })(),\n      pulledView: this.state.pulled.map(p => ({ t: p.t, src: p.src })),\n      hasPulled: this.state.pulled.length > 0, noPulled: this.state.pulled.length === 0,\n      pullGroups, deskPullOpen: this.state.deskPullOpen, toggleDeskPull: () => this.toggleDeskPull(),\n      rainOn: this.state.rainOn, lofiOn: this.state.lofiOn,\n      recordState: this.state.lofiOn ? 'running' : 'paused',\n      rainBtnStyle: ambBtn(this.state.rainOn), lofiBtnStyle: ambBtn(this.state.lofiOn),\n      toggleRain: () => this.toggleRain(), toggleLofi: () => this.toggleLofi(),\n      togglePlay: () => this.togglePlay(), prevSentence: () => this.prevSentence(), nextSentence: () => this.nextSentence(),\n      toggleHighlight: () => this.toggleHighlight(), addToCanvas: () => this.addToCanvas(),\n      openPicker: () => this.openPicker(), closePicker: () => this.closePicker(), closeBoard: () => this.closeBoard(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
